name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint
        run: python3 -m ruff check scripts/

      - name: Validate personas
        run: python3 scripts/validate_personas.py

      - name: Run tests (no GPU)
        run: python3 -m pytest scripts/tests/ -v -m "not gpu"
