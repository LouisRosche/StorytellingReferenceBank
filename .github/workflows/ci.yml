name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint
        run: python3 -m ruff check scripts/

      - name: Format check
        run: python3 -m ruff format --check scripts/

      - name: Validate personas
        run: python3 scripts/validate_personas.py

      - name: Run tests with coverage (no GPU)
        run: python3 -m pytest scripts/tests/ -v -m "not gpu" --tb=short --cov=scripts --cov-report=term --cov-fail-under=80

      - name: Dependency audit
        run: pip audit
        continue-on-error: true

  storefront-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: storefront

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: storefront/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx next lint

      - name: Run tests
        run: npx vitest run

      - name: Type check
        run: npx tsc --noEmit

      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        env:
          STRIPE_SECRET_KEY: sk_test_FAKE_CI_PLACEHOLDER_DO_NOT_USE
          STRIPE_WEBHOOK_SECRET: whsec_FAKE_CI_PLACEHOLDER_DO_NOT_USE
          DOWNLOAD_TOKEN_SECRET: fake_ci_download_token_secret_do_not_use
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_FAKE_CI_PLACEHOLDER
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: npx next build

  student-portal-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate library.json
        run: python3 -c "import json; json.load(open('student-portal/library.json'))"

      - name: Validate codes.json
        run: python3 -c "import json; data = json.load(open('student-portal/codes.json')); assert 'codes' in data, 'Missing codes key'"

      - name: Check HTML syntax
        run: |
          python3 << 'PYEOF'
          from html.parser import HTMLParser
          class Check(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.errors = []
              def handle_starttag(self, tag, attrs): pass
          p = Check()
          p.feed(open('student-portal/index.html').read())
          print('HTML parsed without errors')
          PYEOF

      - name: Validate WCAG contrast ratios
        run: python3 scripts/check_contrast.py student-portal/index.html

      - name: Validate library paths exist
        run: |
          python3 -c "
          import json, sys, os
          lib = json.load(open('student-portal/library.json'))
          missing = []
          for cat in lib.get('categories', []):
              for item in cat.get('items', []):
                  p = item.get('path', '')
                  if p and not os.path.exists(p):
                      missing.append(p)
          if missing:
              print('Missing files referenced in library.json:')
              for m in missing:
                  print(f'  - {m}')
              sys.exit(1)
          print(f'All {sum(len(c[\"items\"]) for c in lib[\"categories\"])} library paths validated')
          "
