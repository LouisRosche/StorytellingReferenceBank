<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 533" fill="none">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="533" rx="16" fill="url(#night)"/>

  <!-- Stars -->
  <circle cx="50" cy="40" r="1.5" fill="#fef3c7" opacity="0.8"/>
  <circle cx="120" cy="60" r="1" fill="#fef3c7" opacity="0.6"/>
  <circle cx="300" cy="30" r="1.5" fill="#fef3c7" opacity="0.7"/>
  <circle cx="350" cy="80" r="1" fill="#fef3c7" opacity="0.5"/>
  <circle cx="80" cy="100" r="1" fill="#fef3c7" opacity="0.4"/>
  <circle cx="250" cy="50" r="1.2" fill="#fef3c7" opacity="0.6"/>
  <circle cx="180" cy="35" r="1" fill="#fef3c7" opacity="0.5"/>
  <circle cx="330" cy="120" r="1.5" fill="#fef3c7" opacity="0.7"/>

  <!-- Moon -->
  <circle cx="320" cy="80" r="30" fill="#fef3c7" opacity="0.9"/>
  <circle cx="310" cy="72" r="28" fill="url(#night)"/>

  <!-- Window frame (warm light) -->
  <g transform="translate(200, 200)">
    <rect x="-60" y="-80" width="120" height="140" rx="4" fill="#fef3c7" opacity="0.15"/>
    <!-- Window panes -->
    <line x1="0" y1="-80" x2="0" y2="60" stroke="#4c1d95" stroke-width="3"/>
    <line x1="-60" y1="-10" x2="60" y2="-10" stroke="#4c1d95" stroke-width="3"/>
    <!-- Window frame border -->
    <rect x="-60" y="-80" width="120" height="140" rx="4" stroke="#4c1d95" stroke-width="4" fill="none"/>
  </g>

  <!-- Milo silhouette (small boy in window) -->
  <g transform="translate(175, 230)">
    <!-- Head -->
    <circle cx="0" cy="-20" r="12" fill="#1e1b4b"/>
    <!-- Body -->
    <path d="M-10 -8 L-12 15 L12 15 L10 -8 Z" fill="#1e1b4b"/>
    <!-- Arms reaching out -->
    <path d="M-12 0 L-22 -5" stroke="#1e1b4b" stroke-width="4" stroke-linecap="round"/>
    <path d="M10 0 L20 -5" stroke="#1e1b4b" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Friendly shadow creatures -->
  <!-- Shadow 1: round blob with eyes -->
  <g transform="translate(80, 350)" opacity="0.6">
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="#4c1d95"/>
    <ellipse cx="0" cy="-10" rx="20" ry="15" fill="#4c1d95"/>
    <circle cx="-6" cy="-8" r="3" fill="#c4b5fd"/>
    <circle cx="6" cy="-8" r="3" fill="#c4b5fd"/>
    <path d="M-4 0 Q0 4 4 0" stroke="#c4b5fd" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Shadow 2: tall wispy one -->
  <g transform="translate(320, 330)" opacity="0.5">
    <path d="M0 20 Q-15 0 -8 -20 Q0 -35 8 -20 Q15 0 0 20Z" fill="#4c1d95"/>
    <circle cx="-3" cy="-10" r="2.5" fill="#c4b5fd"/>
    <circle cx="5" cy="-12" r="2.5" fill="#c4b5fd"/>
  </g>

  <!-- Shadow 3: small curled one (sleeping) -->
  <g transform="translate(140, 400)" opacity="0.4">
    <ellipse cx="0" cy="0" rx="20" ry="12" fill="#4c1d95"/>
    <!-- Closed eyes (zzz) -->
    <path d="M-5 -3 L-1 -3" stroke="#c4b5fd" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M3 -3 L7 -3" stroke="#c4b5fd" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Zzz -->
    <text x="15" y="-10" font-family="system-ui" font-size="8" fill="#c4b5fd" opacity="0.7">z</text>
    <text x="22" y="-18" font-family="system-ui" font-size="10" fill="#c4b5fd" opacity="0.5">z</text>
  </g>

  <!-- Warm glow around Milo -->
  <circle cx="175" cy="220" r="80" fill="url(#glow)"/>

  <!-- Title -->
  <text x="200" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#e0e7ff">
    Where Shadows
  </text>
  <text x="200" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#e0e7ff">
    Sleep
  </text>

  <!-- Author -->
  <text x="200" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#818cf8">
    by Louis Rosche
  </text>
</svg>
