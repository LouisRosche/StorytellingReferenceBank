<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storytelling Reference Bank — Student Library</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
  <style>
    /* ─────────────────────────────────────────────
       DESIGN TOKENS
    ───────────────────────────────────────────── */
    :root {
      --bg:          #FDF8F0;
      --bg-alt:      #F5EDD8;
      --bg-panel:    #FAF5E9;
      --border:      #DDD0B3;
      --ink:         #2C1810;
      --ink-mid:     #5C4033;
      --ink-light:   #8B7355;
      --accent:      #C2410C;
      --accent-hover:#9A3412;
      --gold:        #D97706;
      --sidebar-w:   280px;
      --header-h:    52px;
      --radius:      6px;
      --shadow:      0 1px 3px rgba(44,24,16,0.12);
      --shadow-md:   0 4px 12px rgba(44,24,16,0.12);
      --font-ui:     system-ui, -apple-system, sans-serif;
      --font-text:   Georgia, 'Times New Roman', serif;
      --transition:  0.18s ease;
    }

    [data-theme="dark"] {
      --bg:          #1A1209;
      --bg-alt:      #231A0E;
      --bg-panel:    #1F160B;
      --border:      #3D2E1A;
      --ink:         #F0E6D3;
      --ink-mid:     #C8B49A;
      --ink-light:   #8B7A65;
      --accent:      #F97316;
      --accent-hover:#EA580C;
      --gold:        #F59E0B;
      --shadow:      0 1px 3px rgba(0,0,0,0.4);
      --shadow-md:   0 4px 12px rgba(0,0,0,0.4);
    }

    /* ─────────────────────────────────────────────
       RESET & BASE
    ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-ui);
      font-size: 15px;
      line-height: 1.5;
      transition: background var(--transition), color var(--transition);
    }

    button {
      font-family: var(--font-ui);
      cursor: pointer;
      border: none;
      background: none;
    }

    a { color: var(--accent); }

    .hidden { display: none !important; }

    /* ─────────────────────────────────────────────
       LOCK SCREEN
    ───────────────────────────────────────────── */
    #lock-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    #lock-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 30% 20%, rgba(194,65,12,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(217,119,6,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .lock-card {
      position: relative;
      max-width: 440px;
      width: 100%;
      margin: 2rem;
      padding: 3rem 2.5rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-md);
      text-align: center;
    }

    .lock-emblem {
      font-size: 2.4rem;
      margin-bottom: 1.25rem;
      opacity: 0.85;
      display: block;
    }

    .lock-title {
      font-family: var(--font-text);
      font-size: 1.6rem;
      font-weight: normal;
      color: var(--ink);
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    .lock-subtitle {
      font-size: 0.85rem;
      color: var(--ink-light);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 0.4rem;
      margin-bottom: 2rem;
    }

    .lock-quote {
      font-family: var(--font-text);
      font-style: italic;
      font-size: 0.9rem;
      color: var(--ink-mid);
      line-height: 1.65;
      margin-bottom: 2rem;
      padding: 1rem 1.25rem;
      border-left: 3px solid var(--gold);
      text-align: left;
      background: var(--bg-alt);
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    .lock-quote cite {
      display: block;
      margin-top: 0.5rem;
      font-size: 0.78rem;
      font-style: normal;
      color: var(--ink-light);
    }

    .lock-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .code-input-wrap {
      position: relative;
    }

    #access-code {
      width: 100%;
      padding: 0.75rem 1rem;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--ink);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      text-align: center;
    }

    #access-code:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(194,65,12,0.12);
    }

    #access-code.error {
      border-color: #DC2626;
      box-shadow: 0 0 0 3px rgba(220,38,38,0.12);
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    #unlock-btn {
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: white;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      border-radius: var(--radius);
      transition: background var(--transition), transform var(--transition);
    }

    #unlock-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    #unlock-btn:active { transform: translateY(0); }

    .lock-hint {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--ink-light);
    }

    #error-msg {
      font-size: 0.83rem;
      color: #DC2626;
      min-height: 1.2em;
    }

    /* ─────────────────────────────────────────────
       LIBRARY LAYOUT
    ───────────────────────────────────────────── */
    #library {
      display: grid;
      grid-template-rows: var(--header-h) 1fr;
      grid-template-columns: var(--sidebar-w) 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* HEADER */
    .lib-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0 1.25rem;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .lib-header-title {
      font-family: var(--font-text);
      font-size: 1rem;
      font-weight: normal;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    .lib-header-title span {
      color: var(--ink-light);
      font-size: 0.85rem;
    }

    .header-spacer { flex: 1; }

    .progress-pill {
      font-size: 0.75rem;
      color: var(--ink-light);
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 0.2rem 0.65rem;
    }

    .progress-pill b { color: var(--gold); }

    .theme-toggle {
      font-size: 1rem;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius);
      color: var(--ink-light);
      transition: background var(--transition), color var(--transition);
    }

    .theme-toggle:hover {
      background: var(--bg-alt);
      color: var(--ink);
    }

    /* SIDEBAR */
    .lib-sidebar {
      overflow-y: auto;
      border-right: 1px solid var(--border);
      background: var(--bg-panel);
      padding: 0.75rem 0;
    }

    .lib-sidebar::-webkit-scrollbar { width: 4px; }
    .lib-sidebar::-webkit-scrollbar-track { background: transparent; }
    .lib-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .category-group {
      margin-bottom: 0.25rem;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 1rem;
      width: 100%;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-mid);
      cursor: pointer;
      transition: background var(--transition);
      border-radius: 0;
    }

    .category-header:hover { background: var(--bg-alt); }

    .cat-icon {
      font-size: 0.9rem;
      opacity: 0.7;
    }

    .cat-chevron {
      margin-left: auto;
      font-size: 0.65rem;
      color: var(--ink-light);
      transition: transform var(--transition);
    }

    .category-group.collapsed .cat-chevron { transform: rotate(-90deg); }

    .category-items {
      overflow: hidden;
      max-height: 500px;
      transition: max-height 0.2s ease;
    }

    .category-group.collapsed .category-items {
      max-height: 0;
    }

    .sidebar-item {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      padding: 0.4rem 1rem 0.4rem 2rem;
      width: 100%;
      text-align: left;
      cursor: pointer;
      transition: background var(--transition);
      position: relative;
    }

    .sidebar-item::before {
      content: '';
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 0;
      border-radius: 2px;
      background: var(--accent);
      transition: height var(--transition);
    }

    .sidebar-item:hover { background: var(--bg-alt); }

    .sidebar-item.active {
      background: var(--bg-alt);
      color: var(--accent);
    }

    .sidebar-item.active::before { height: 60%; }

    .sidebar-item.read .item-title::after {
      content: ' ✓';
      color: var(--gold);
      font-size: 0.7rem;
    }

    .item-title {
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.3;
    }

    .sidebar-item.active .item-title { color: var(--accent); }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .badge {
      font-size: 0.65rem;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-essential { background: rgba(194,65,12,0.12); color: var(--accent); }
    .badge-beginner  { background: rgba(29,78,216,0.1);  color: #1D4ED8; }
    .badge-intermediate { background: rgba(217,119,6,0.12); color: #B45309; }
    .badge-advanced  { background: rgba(109,40,217,0.1); color: #6D28D9; }

    [data-theme="dark"] .badge-beginner { color: #60A5FA; }
    [data-theme="dark"] .badge-intermediate { color: #FCD34D; }
    [data-theme="dark"] .badge-advanced { color: #A78BFA; }

    .read-time {
      font-size: 0.65rem;
      color: var(--ink-light);
    }

    /* MAIN CONTENT */
    .lib-main {
      overflow-y: auto;
      padding: 0;
      background: var(--bg);
    }

    .lib-main::-webkit-scrollbar { width: 5px; }
    .lib-main::-webkit-scrollbar-track { background: transparent; }
    .lib-main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* WELCOME SCREEN */
    #welcome-screen {
      padding: 2.5rem;
      max-width: 820px;
    }

    .welcome-intro {
      margin-bottom: 2.5rem;
    }

    .welcome-intro h1 {
      font-family: var(--font-text);
      font-size: 1.6rem;
      font-weight: normal;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .welcome-intro p {
      color: var(--ink-mid);
      line-height: 1.7;
      max-width: 560px;
    }

    .welcome-intro .progress-note {
      margin-top: 0.75rem;
      font-size: 0.83rem;
      color: var(--ink-light);
    }

    .category-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .category-card {
      padding: 1.25rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
    }

    .category-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }

    .card-icon {
      font-size: 1.1rem;
      color: var(--ink-light);
    }

    .card-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--ink);
    }

    .card-count {
      margin-left: auto;
      font-size: 0.72rem;
      color: var(--ink-light);
      background: var(--bg-alt);
      padding: 0.1rem 0.4rem;
      border-radius: 99px;
    }

    .card-desc {
      font-size: 0.82rem;
      color: var(--ink-mid);
      line-height: 1.55;
    }

    .card-items-preview {
      margin-top: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .card-item-chip {
      font-size: 0.72rem;
      padding: 0.15rem 0.5rem;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 99px;
      color: var(--ink-mid);
    }

    /* CATEGORY LANDING PAGE */
    .cat-landing {
      padding: 2rem 2.5rem 4rem;
      max-width: 720px;
    }

    .cat-landing-header {
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .cat-landing-title {
      font-family: var(--font-text);
      font-size: 1.4rem;
      font-weight: normal;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .cat-landing-icon { opacity: 0.65; }

    .cat-landing-desc {
      margin-top: 0.5rem;
      font-size: 0.88rem;
      color: var(--ink-mid);
      line-height: 1.65;
      max-width: 560px;
    }

    .landing-item-card {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      padding: 1.25rem 1.5rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
      margin-bottom: 0.875rem;
    }

    .landing-item-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    .landing-card-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }

    .landing-item-title {
      font-size: 0.97rem;
      font-weight: 600;
      color: var(--ink);
    }

    .landing-read-indicator {
      font-size: 0.75rem;
      color: var(--gold);
      font-weight: normal;
    }

    .landing-card-meta {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex-shrink: 0;
    }

    .landing-item-hook {
      font-family: var(--font-text);
      font-size: 0.9rem;
      color: var(--ink-mid);
      line-height: 1.65;
      font-style: italic;
    }

    /* CONTENT HOOK */
    .content-hook {
      margin-bottom: 2rem;
      padding: 0.875rem 1.25rem;
      background: var(--bg-alt);
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
      font-family: var(--font-text);
      font-size: 0.93rem;
      color: var(--ink-mid);
      line-height: 1.7;
      font-style: italic;
    }

    /* CONTENT VIEWER */
    #content-view {
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .content-toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .back-btn {
      font-size: 0.8rem;
      color: var(--ink-light);
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius);
      transition: background var(--transition), color var(--transition);
    }

    .back-btn:hover { background: var(--bg-alt); color: var(--ink); }

    .breadcrumb {
      font-size: 0.8rem;
      color: var(--ink-light);
    }

    .breadcrumb span { color: var(--ink-mid); }

    .toolbar-spacer { flex: 1; }

    .content-badges {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .content-area {
      padding: 2rem 2.5rem 4rem;
      max-width: 720px;
    }

    /* MARKDOWN TYPOGRAPHY */
    .prose { font-family: var(--font-text); }

    .prose h1 {
      font-size: 1.65rem;
      font-weight: normal;
      color: var(--ink);
      line-height: 1.25;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .prose h2 {
      font-size: 1.15rem;
      font-weight: 600;
      font-family: var(--font-ui);
      color: var(--ink);
      margin-top: 2.25rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--border);
      letter-spacing: -0.01em;
    }

    .prose h3 {
      font-size: 0.95rem;
      font-weight: 600;
      font-family: var(--font-ui);
      color: var(--ink-mid);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 1.5rem;
      margin-bottom: 0.6rem;
    }

    .prose h4 {
      font-size: 0.9rem;
      font-weight: 600;
      font-family: var(--font-ui);
      color: var(--ink);
      margin-top: 1.25rem;
      margin-bottom: 0.4rem;
    }

    .prose p {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--ink);
      margin-bottom: 1rem;
    }

    .prose ul, .prose ol {
      padding-left: 1.5rem;
      margin-bottom: 1rem;
    }

    .prose li {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }

    .prose li::marker { color: var(--accent); }

    .prose blockquote {
      margin: 1.5rem 0;
      padding: 1rem 1.25rem;
      background: var(--bg-alt);
      border-left: 3px solid var(--gold);
      border-radius: 0 var(--radius) var(--radius) 0;
      font-style: italic;
      color: var(--ink-mid);
    }

    .prose blockquote p { margin-bottom: 0; color: var(--ink-mid); font-size: 0.97rem; }

    .prose code {
      font-family: 'Courier New', monospace;
      font-size: 0.85em;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1em 0.35em;
      color: var(--accent);
    }

    .prose pre {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin-bottom: 1rem;
    }

    .prose pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--ink);
      font-size: 0.88rem;
    }

    .prose strong { color: var(--ink); font-weight: 700; }

    .prose em { font-style: italic; }

    .prose hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .prose table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
      font-family: var(--font-ui);
    }

    .prose th {
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-mid);
      border-bottom: 2px solid var(--border);
      padding: 0.5rem 0.75rem;
    }

    .prose td {
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      color: var(--ink);
      line-height: 1.5;
      vertical-align: top;
    }

    .prose tr:last-child td { border-bottom: none; }

    .prose tr:hover td { background: var(--bg-alt); }

    /* LOADING & ERROR STATES */
    .loading-state {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 3rem 2.5rem;
      color: var(--ink-light);
      font-size: 0.88rem;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state {
      padding: 3rem 2.5rem;
      color: var(--ink-mid);
      font-size: 0.88rem;
    }

    /* DAILY PRACTICE WIDGET */
    .daily-practice {
      margin: 0 1rem 0.75rem;
      padding: 0.75rem;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-left: 3px solid var(--gold);
    }

    .daily-practice-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 0.35rem;
    }

    .daily-practice-text {
      font-size: 0.78rem;
      color: var(--ink-mid);
      line-height: 1.5;
      font-family: var(--font-text);
      font-style: italic;
    }

    /* RESPONSIVE */
    @media (max-width: 680px) {
      :root { --sidebar-w: 100vw; }

      #library {
        grid-template-columns: 1fr;
        grid-template-rows: var(--header-h) auto 1fr;
      }

      .lib-sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 45vh;
      }

      .lib-main { overflow-y: auto; }
      .content-area { padding: 1.25rem 1.25rem 3rem; }
      #welcome-screen { padding: 1.25rem; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════
     LOCK SCREEN
═════════════════════════════════════════════ -->
<div id="lock-screen">
  <div class="lock-card">
    <span class="lock-emblem">◈</span>
    <h1 class="lock-title">Storytelling Reference Bank</h1>
    <p class="lock-subtitle">Student Library</p>

    <blockquote class="lock-quote">
      "The mind is not a vessel to be filled, but a fire to be kindled."
      <cite>— Plutarch</cite>
    </blockquote>

    <form class="lock-form" id="lock-form" autocomplete="off">
      <div class="code-input-wrap">
        <input
          type="text"
          id="access-code"
          placeholder="YOUR-ACCESS-CODE"
          autocomplete="off"
          spellcheck="false"
          maxlength="32"
        >
      </div>
      <p id="error-msg"></p>
      <button type="submit" id="unlock-btn">Open the Library</button>
    </form>
    <p class="lock-hint">Your instructor will provide your access code.</p>
  </div>
</div>

<!-- ════════════════════════════════════════════
     LIBRARY
═════════════════════════════════════════════ -->
<div id="library" class="hidden">

  <!-- Header -->
  <header class="lib-header">
    <div class="lib-header-title">
      Storytelling Reference Bank
      <span>/ Student Library</span>
    </div>
    <div class="header-spacer"></div>
    <div class="progress-pill" id="progress-pill">
      <b id="progress-count">0</b> of <span id="progress-total">0</span> read
    </div>
    <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">◑</button>
  </header>

  <!-- Sidebar -->
  <aside class="lib-sidebar" id="lib-sidebar">
    <!-- Injected by JS -->
  </aside>

  <!-- Main -->
  <main class="lib-main" id="lib-main">
    <!-- Welcome or content view, injected by JS -->
  </main>

</div>

<script>
/* ════════════════════════════════════════════
   CONFIGURATION
═════════════════════════════════════════════ */
const STORAGE_KEY = 'srb_unlocked';
const READ_KEY    = 'srb_read';
const THEME_KEY   = 'srb_theme';

/* ════════════════════════════════════════════
   DAILY PRACTICE PROMPTS
═════════════════════════════════════════════ */
const DAILY_PROMPTS = [
  "Pick a scene you've written. Find the most important thing in it. Cut the line that states it directly.",
  "Write a character description using only what they notice, not what they look like.",
  "Identify your antagonist's most compelling argument. Write it sympathetically.",
  "Rewrite one paragraph in a completely different rhythm. Percussive. Then flowing. Choose.",
  "Name one ordinary object in your story. Observe it until it becomes strange. Describe what you actually see.",
  "Find where you tell the reader how to feel. Cut it. Let the image carry the weight.",
  "What does your protagonist not understand about themselves? Write the scene that proves it.",
  "Take your ending. Ask: is it inevitable in retrospect? If you can predict it from page one, add complication.",
  "Write the counter-argument to your story's central claim. If you can't, the theme isn't deep enough.",
  "Read your last page aloud. If it doesn't have music, it doesn't have life.",
  "What remains of your story if you remove every subplot? That residue is the real story.",
  "Find a place where you generalize toward the reader. Replace it with a specific: not 'grief' but one detail."
];

/* ════════════════════════════════════════════
   HASH UTILITY (Web Crypto API)
═════════════════════════════════════════════ */
async function hashCode(text) {
  const normalized = new TextEncoder().encode(text.trim().toUpperCase());
  const salt = new TextEncoder().encode('StorytellingReferenceBank-v1');
  const keyMaterial = await crypto.subtle.importKey('raw', normalized, 'PBKDF2', false, ['deriveBits']);
  const derived = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial, 256
  );
  return Array.from(new Uint8Array(derived)).map(b => b.toString(16).padStart(2, '0')).join('');
}

/** Escape HTML entities to prevent XSS when interpolating data into templates. */
function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }

/* ════════════════════════════════════════════
   STATE
═════════════════════════════════════════════ */
let library = null;
let readSet = new Set(JSON.parse(localStorage.getItem(READ_KEY) || '[]'));
let currentItemId = null;
let currentCatId  = null;

function saveRead() {
  localStorage.setItem(READ_KEY, JSON.stringify([...readSet]));
}

/* ════════════════════════════════════════════
   THEME
═════════════════════════════════════════════ */
(function initTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();

document.getElementById('theme-toggle').addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
  localStorage.setItem(THEME_KEY, isDark ? 'light' : 'dark');
});

/* ════════════════════════════════════════════
   LOCK SCREEN
═════════════════════════════════════════════ */
async function loadCodes() {
  try {
    const res = await fetch('codes.json');
    const data = await res.json();
    return data.hashes || [];
  } catch {
    return [];
  }
}

document.getElementById('lock-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const input = document.getElementById('access-code');
  const errorMsg = document.getElementById('error-msg');
  const code = input.value.trim().toUpperCase();

  if (!code) return;

  errorMsg.textContent = '';
  const btn = document.getElementById('unlock-btn');
  btn.textContent = 'Checking…';
  btn.disabled = true;

  try {
    const [hash, validHashes] = await Promise.all([hashCode(code), loadCodes()]);

    if (validHashes.includes(hash)) {
      sessionStorage.setItem(STORAGE_KEY, '1');
      document.getElementById('lock-screen').classList.add('hidden');
      document.getElementById('library').classList.remove('hidden');
      initLibrary();
    } else {
      input.classList.add('error');
      errorMsg.textContent = 'Code not recognized. Check with your instructor.';
      setTimeout(() => input.classList.remove('error'), 400);
    }
  } catch {
    errorMsg.textContent = 'Could not verify code. Try again.';
  } finally {
    btn.textContent = 'Open the Library';
    btn.disabled = false;
  }
});

/* ════════════════════════════════════════════
   LIBRARY INIT
═════════════════════════════════════════════ */
async function initLibrary() {
  try {
    const res = await fetch('library.json');
    library = await res.json();
    renderSidebar();
    renderWelcome();
    updateProgress();
  } catch {
    document.getElementById('lib-main').innerHTML =
      '<div class="error-state">Could not load library data. Make sure you\'re running from the repo root.</div>';
  }
}

/* ════════════════════════════════════════════
   SIDEBAR
═════════════════════════════════════════════ */
function renderSidebar() {
  const sidebar = document.getElementById('lib-sidebar');
  const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
  const prompt = DAILY_PROMPTS[dayOfYear % DAILY_PROMPTS.length];

  let html = `
    <div class="daily-practice">
      <div class="daily-practice-label">Today's Practice</div>
      <div class="daily-practice-text">${esc(prompt)}</div>
    </div>
  `;

  for (const cat of library.categories) {
    html += `
      <div class="category-group" data-cat="${esc(cat.id)}">
        <button class="category-header" onclick="toggleCategory('${esc(cat.id)}')">
          <span class="cat-icon">${esc(cat.icon)}</span>
          ${esc(cat.label)}
          <span class="cat-chevron">▼</span>
        </button>
        <div class="category-items">
    `;
    for (const item of cat.items) {
      const isRead = readSet.has(item.id);
      html += `
        <button
          class="sidebar-item${isRead ? ' read' : ''}"
          id="sidebar-${esc(item.id)}"
          onclick="loadItem('${esc(item.id)}')"
        >
          <div class="item-title">${esc(item.title)}</div>
          <div class="item-meta">
            <span class="badge badge-${esc(item.difficulty)}">${esc(item.difficulty)}</span>
            <span class="read-time">${esc(item.readingTime)} min</span>
          </div>
        </button>
      `;
    }
    html += `</div></div>`;
  }

  sidebar.innerHTML = html;
}

function toggleCategory(catId) {
  const group = document.querySelector(`.category-group[data-cat="${catId}"]`);
  group.classList.toggle('collapsed');
}

/* ════════════════════════════════════════════
   WELCOME SCREEN
═════════════════════════════════════════════ */
function renderWelcome() {
  const total = library.categories.reduce((n, c) => n + c.items.length, 0);
  const readCount = [...readSet].filter(id =>
    library.categories.some(c => c.items.some(i => i.id === id))
  ).length;

  let cards = '';
  for (const cat of library.categories) {
    const chips = cat.items.map(i =>
      `<span class="card-item-chip">${esc(i.title)}</span>`
    ).join('');
    cards += `
      <div class="category-card" onclick="openCategory('${esc(cat.id)}')">
        <div class="card-header">
          <span class="card-icon">${esc(cat.icon)}</span>
          <span class="card-title">${esc(cat.label)}</span>
          <span class="card-count">${cat.items.length}</span>
        </div>
        <p class="card-desc">${esc(cat.description)}</p>
        <div class="card-items-preview">${chips}</div>
      </div>
    `;
  }

  document.getElementById('lib-main').innerHTML = `
    <div id="welcome-screen">
      <div class="welcome-intro">
        <h1>Welcome to the library.</h1>
        <p>
          These are the core tools: frameworks for structure, principles for craft,
          templates for execution. Read in any order. Every category is a complete
          starting point — there is no required sequence.
        </p>
        <p class="progress-note">
          You've read <strong>${readCount}</strong> of ${total} resources.
          Completed items are marked ✓ in the sidebar.
        </p>
      </div>
      <div class="category-cards">${cards}</div>
    </div>
  `;
}

function openCategory(catId) {
  currentCatId = catId;
  const group = document.querySelector(`.category-group[data-cat="${catId}"]`);
  if (group) group.classList.remove('collapsed');
  renderCategoryLanding(catId);
}

/* ════════════════════════════════════════════
   CATEGORY LANDING
═════════════════════════════════════════════ */
function renderCategoryLanding(catId) {
  const cat = library.categories.find(c => c.id === catId);
  if (!cat) return;

  currentItemId = null;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));

  let itemCards = '';
  for (const item of cat.items) {
    const isRead = readSet.has(item.id);
    itemCards += `
      <div class="landing-item-card" onclick="loadItem('${esc(item.id)}')">
        <div class="landing-card-top">
          <div class="landing-item-title">${esc(item.title)}${isRead ? ' <span class="landing-read-indicator">✓</span>' : ''}</div>
          <div class="landing-card-meta">
            <span class="badge badge-${esc(item.difficulty)}">${esc(item.difficulty)}</span>
            <span class="read-time">${esc(item.readingTime)} min</span>
          </div>
        </div>
        <div class="landing-item-hook">${esc(item.hook)}</div>
      </div>
    `;
  }

  document.getElementById('lib-main').innerHTML = `
    <div id="content-view">
      <div class="content-toolbar">
        <button class="back-btn" onclick="backToWelcome()">← Library</button>
        <span class="breadcrumb"><span>${cat.label}</span></span>
        <div class="toolbar-spacer"></div>
        <span style="font-size:0.78rem;color:var(--ink-light);">${cat.items.length} resources</span>
      </div>
      <div class="cat-landing">
        <div class="cat-landing-header">
          <div class="cat-landing-title"><span class="cat-landing-icon">${esc(cat.icon)}</span> ${esc(cat.label)}</div>
          <p class="cat-landing-desc">${esc(cat.description)}</p>
        </div>
        ${itemCards}
      </div>
    </div>
  `;
  document.getElementById('lib-main').scrollTop = 0;
}

/* ════════════════════════════════════════════
   CONTENT LOADING
═════════════════════════════════════════════ */
async function loadItem(itemId) {
  // Find item in library
  let item = null;
  let cat = null;
  for (const c of library.categories) {
    const found = c.items.find(i => i.id === itemId);
    if (found) { item = found; cat = c; break; }
  }
  if (!item) return;

  currentItemId = itemId;
  currentCatId  = cat.id;

  // Update sidebar active state and expand category
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const sidebarEl = document.getElementById(`sidebar-${itemId}`);
  if (sidebarEl) {
    sidebarEl.classList.add('active');
    sidebarEl.scrollIntoView({ block: 'nearest' });
  }
  const group = document.querySelector(`.category-group[data-cat="${cat.id}"]`);
  if (group) group.classList.remove('collapsed');

  const toolbar = `
    <div class="content-toolbar">
      <button class="back-btn" onclick="backToCategory('${esc(cat.id)}')">← ${esc(cat.label)}</button>
      <span class="breadcrumb">${esc(cat.label)} <span>/</span> ${esc(item.title)}</span>
      <div class="toolbar-spacer"></div>
      <div class="content-badges">
        <span class="badge badge-${esc(item.difficulty)}">${esc(item.difficulty)}</span>
        <span class="badge" style="background:var(--bg-alt);color:var(--ink-light);">${esc(item.readingTime)} min</span>
      </div>
    </div>
  `;

  // Show loading
  document.getElementById('lib-main').innerHTML = `
    <div id="content-view">
      ${toolbar}
      <div class="loading-state"><div class="spinner"></div> Loading…</div>
    </div>
  `;

  try {
    const res = await fetch(item.path);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const md = await res.text();
    const html = DOMPurify.sanitize(marked.parse(md));

    document.getElementById('lib-main').innerHTML = `
      <div id="content-view">
        ${toolbar}
        <div class="content-area">
          <div class="content-hook">${esc(item.hook)}</div>
          <div class="prose">${html}</div>
        </div>
      </div>
    `;

    // Scroll to top of content
    document.getElementById('lib-main').scrollTop = 0;

    // Mark as read
    readSet.add(itemId);
    saveRead();
    updateProgress();
    const sEl = document.getElementById(`sidebar-${itemId}`);
    if (sEl) sEl.classList.add('read');

  } catch (err) {
    document.getElementById('lib-main').innerHTML = `
      <div id="content-view">
        ${toolbar}
        <div class="error-state">
          <p>Could not load this file.</p>
          <p style="margin-top:0.5rem;color:var(--ink-light);font-size:0.8rem;">
            Make sure the server is running from the repo root directory.
          </p>
        </div>
      </div>
    `;
  }
}

function backToWelcome() {
  currentItemId = null;
  currentCatId  = null;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  renderWelcome();
}

function backToCategory(catId) {
  currentItemId = null;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  renderCategoryLanding(catId);
}

/* ════════════════════════════════════════════
   PROGRESS
═════════════════════════════════════════════ */
function updateProgress() {
  if (!library) return;
  const all = library.categories.flatMap(c => c.items.map(i => i.id));
  const done = all.filter(id => readSet.has(id)).length;
  document.getElementById('progress-count').textContent = done;
  document.getElementById('progress-total').textContent = all.length;
}

/* ════════════════════════════════════════════
   SESSION PERSISTENCE
═════════════════════════════════════════════ */
if (sessionStorage.getItem(STORAGE_KEY)) {
  document.getElementById('lock-screen').classList.add('hidden');
  document.getElementById('library').classList.remove('hidden');
  initLibrary();
}

/* ════════════════════════════════════════════
   KEYBOARD SHORTCUTS
═════════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && currentItemId) {
    backToWelcome();
  }
});
</script>
</body>
</html>
